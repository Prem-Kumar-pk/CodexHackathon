services:
  postgres:
    image: postgres:16-alpine
    container_name: support-hub-postgres
    environment:
      POSTGRES_DB: support_hub
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: support-hub-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://support:support@postgres:5432/support_hub
      USE_MOCK_DB: "false"
      JWT_SECRET: replace-with-a-real-secret-before-production
      JWT_EXPIRES_IN: 8h
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
        VITE_SOCKET_URL: http://localhost:4000
    container_name: support-hub-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
